<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <defs>
    <linearGradient id="goldAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4B85A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Logo Mark: Geometric "N" monogram in a rounded square frame -->
  <g transform="translate(10, 10)">
    <!-- Outer rounded square frame -->
    <rect x="0" y="0" width="80" height="80" rx="16" ry="16" fill="#1C1C1E" />

    <!-- Inner geometric "N" letterform — constructed from clean lines -->
    <!-- Left vertical bar -->
    <rect x="18" y="18" width="10" height="44" rx="2" fill="#FAF9F6" />

    <!-- Diagonal connector -->
    <polygon points="18,18 28,18 62,62 52,62" fill="#FAF9F6" />

    <!-- Right vertical bar -->
    <rect x="52" y="18" width="10" height="44" rx="2" fill="#FAF9F6" />

    <!-- Gold accent line at bottom -->
    <rect x="18" y="68" width="44" height="2.5" rx="1.25" fill="url(#goldAccent)" />
  </g>

  <!-- Wordmark -->
  <g transform="translate(108, 0)">
    <!-- "NOVERA" -->
    <text x="0" y="48" font-family="'Playfair Display', 'Georgia', serif" font-size="38" font-weight="700" fill="#1C1C1E" letter-spacing="1.5">NOVERA</text>

    <!-- "BOOKKEEPING" -->
    <text x="2" y="72" font-family="'DM Sans', 'Helvetica Neue', sans-serif" font-size="14.5" font-weight="500" fill="#A8A29E" letter-spacing="5">BOOKKEEPING</text>

    <!-- Thin gold accent line between name and descriptor -->
    <rect x="0" y="54" width="40" height="1.5" rx="0.75" fill="url(#goldAccent)" />
  </g>
</svg>